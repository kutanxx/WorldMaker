<!doctype html>
<html lang="ko">
  <head><meta charset="utf-8" /><title>WorldMaker</title><style>
  body { margin: 0; font-family: system-ui, sans-serif; }
  .controls { display: flex; gap: 8px; padding: 8px; align-items: center; }
  .stage svg { display: block; width: 100%; height: auto; }
  .stage svg.city { max-width: 560px; margin: 0 auto; }
  button, input { padding: 4px 8px; }
  .timeline { display: flex; gap: 8px; padding: 8px; align-items: center; }
  .timeline-slider { flex: 1; }
  .timeline-year { min-width: 56px; font-variant-numeric: tabular-nums; }
  .political .territory { pointer-events: none; }
  .chronicle { max-height: 240px; overflow: auto; padding: 0 8px; }
  .chronicle-event.future { opacity: .4; }
  .view-toggle { display: inline-flex; gap: 0; }
  .view-toggle button.active { background: #d8c9a3; font-weight: 600; }
  .world.view-political .biomes { opacity: .45; }
  .world.view-political .biome-legend { display: none; }
</style></head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
